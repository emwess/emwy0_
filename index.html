<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Uygulama</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDwTZvXVh4KBViFp_6ELfkNViaaKz-8Umg",
  authDomain: "emwess-1c215.firebaseapp.com",
  projectId: "emwess-1c215",
  storageBucket: "emwess-1c215.firebasestorage.app",
  messagingSenderId: "1085028708013",
  appId: "1:1085028708013:web:246bed97c26ce49b072024",
  measurementId: "G-WCX7QRGWF3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.kayitOl = function(email, sifre){
  if(!email.endsWith("@gmail.com")){
    alert("Email @gmail.com olmalı");
    return;
  }
  if(sifre.length < 6){
    alert("Şifre en az 6 karakter");
    return;
  }

  createUserWithEmailAndPassword(auth, email, sifre)
  .then(()=>{
    girisYap(email,sifre);
  })
  .catch(err=>alert(err.message));
}

window.girisYap = function(email, sifre){
  signInWithEmailAndPassword(auth, email, sifre)
  .then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="flex";
  })
  .catch(err=>alert(err.message));
}
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

/* APP LAYOUT */
#app{
  display:none;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  padding:15px;
}

.sidebar button{
  display:block;
  width:100%;
  margin:10px 0;
  background:#1e293b;
}

/* CONTENT */
.content{
  flex:1;
  padding:20px;
}

.section{
  display:none;
}

.active{
  display:block;
}

/* CARDS */
.box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:15px;
  transition:0.3s;
}

.box:hover{
  transform:translateY(-5px);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Giriş</h2>
    <input id="email" placeholder="Email">
    <input id="sifre" type="password" placeholder="Şifre">
    <button onclick="kayitOl(email.value,sifre.value)">Kayıt Ol</button>
    <button onclick="girisYap(email.value,sifre.value)">Giriş</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="sidebar">
    <h3>📘 Menü</h3>
    <button onclick="show('kitap')">Kitap</button>
    <button onclick="show('gunluk')">Günlük</button>
    <button onclick="show('muzik')">Müzik</button>
  </div>

  <div class="content">

    <div id="kitap" class="section active">
      <div class="box">
        <h2>📚 Kitap</h2>
        <input id="kitapInput">
        <button onclick="kitapEkle()">Ekle</button>
        <div id="kitapListesi"></div>
      </div>
    </div>

    <div id="gunluk" class="section">
      <div class="box">
        <h2>📝 Günlük</h2>
        <textarea id="gunlukInput"></textarea>
        <button onclick="gunlukEkle()">Ekle</button>
        <div id="gunlukListesi"></div>
      </div>
    </div>

    <div id="muzik" class="section">
      <div class="box">
        <h2>🎵 Müzik</h2>
        <audio controls>
          <source src="music.mp3" type="audio/mpeg">
        </audio>
      </div>
    </div>

  </div>

</div>

<script>
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* KITAP */
function kitapEkle(){
  let list = JSON.parse(localStorage.getItem("kitaplar")) || [];
  list.push(kitapInput.value);
  localStorage.setItem("kitaplar",JSON.stringify(list));
  kitapGoster();
}

function kitapGoster(){
  let list = JSON.parse(localStorage.getItem("kitaplar")) || [];
  kitapListesi.innerHTML="";
  list.forEach(k=>{
    kitapListesi.innerHTML+=`<p>📖 ${k}</p>`;
  });
}

/* GUNLUK */
function gunlukEkle(){
  let list = JSON.parse(localStorage.getItem("gunluklar")) || [];
  list.push(gunlukInput.value);
  localStorage.setItem("gunluklar",JSON.stringify(list));
  gunlukGoster();
}

function gunlukGoster(){
  let list = JSON.parse(localStorage.getItem("gunluklar")) || [];
  gunlukListesi.innerHTML="";
  list.forEach(g=>{
    gunlukListesi.innerHTML+=`<p>📝 ${g}</p>`;
  });
}
</script>

</body>
</html>
