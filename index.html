<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeni Nesil App</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f9; }

#loginPage {
  display:flex; justify-content:center; align-items:center;
  height:100vh;
}

.box {
  background:#fff; padding:20px; border-radius:10px;
  width:300px; text-align:center;
}

input, textarea {
  width:90%; padding:8px; margin:5px;
}

#topBar {
  display:none;
  background:#1e3a8a;
  color:#fff;
  padding:10px;
  justify-content:space-between;
}

.menu button {
  margin-left:5px;
}

.section {
  display:none;
  padding:20px;
}

.active { display:block; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="box">
    <h2>Giriş</h2>
    <input id="email" placeholder="Email">
    <input id="sifre" type="password" placeholder="Şifre">
    <button onclick="giris()">Giriş</button>
    <button onclick="kayit()">Kayıt Ol</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topBar">
  <div>📘 App</div>
  <div class="menu">
    <button onclick="show('kitap')">Kitap</button>
    <button onclick="show('gunluk')">Günlük</button>
    <button onclick="cikis()">Çıkış</button>
  </div>
</div>

<!-- KITAP -->
<div id="kitap" class="section">
  <h2>Kitaplar</h2>
  <input id="kitapInput" placeholder="Kitap adı">
  <button onclick="kitapEkle()">Ekle</button>
  <div id="kitapListesi"></div>
</div>

<!-- GÜNLÜK -->
<div id="gunluk" class="section">
  <h2>Günlük</h2>
  <textarea id="gunlukInput"></textarea>
  <button onclick="gunlukEkle()">Ekle</button>
  <div id="gunlukListesi"></div>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDwTZvXVh4KBViFp_6ELfkNViaaKz-8Umg",
  authDomain: "emwess-1c215.firebaseapp.com",
  projectId: "emwess-1c215",
  storageBucket: "emwess-1c215.firebasestorage.app",
  messagingSenderId: "1085028708013",
  appId: "1:1085028708013:web:246bed97c26ce49b072024"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

/* LOGIN */
function giris(){
  auth.signInWithEmailAndPassword(email.value, sifre.value)
  .then(user=>{
    currentUser = user.user;
    loginPage.style.display="none";
    topBar.style.display="flex";
    show("kitap");
    loadData();
  })
  .catch(e=>alert(e.message));
}

function kayit(){
  auth.createUserWithEmailAndPassword(email.value, sifre.value)
  .then(()=>alert("Kayıt başarılı"))
  .catch(e=>alert(e.message));
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user;
    loginPage.style.display="none";
    topBar.style.display="flex";
    show("kitap");
    loadData();
  }
});

/* SAYFA GEÇİŞ */
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* KİTAP */
function kitapEkle(){
  db.collection("users")
  .doc(currentUser.uid)
  .collection("kitaplar")
  .add({
    text: kitapInput.value,
    createdAt: new Date()
  });
  kitapInput.value="";
}

function kitapGoster(){
  db.collection("users")
  .doc(currentUser.uid)
  .collection("kitaplar")
  .orderBy("createdAt","desc")
  .onSnapshot(snap=>{
    kitapListesi.innerHTML="";
    snap.forEach(doc=>{
      kitapListesi.innerHTML += `<p>${doc.data().text}</p>`;
    });
  });
}

/* GÜNLÜK */
function gunlukEkle(){
  db.collection("users")
  .doc(currentUser.uid)
  .collection("gunlukler")
  .add({
    text: gunlukInput.value,
    createdAt: new Date()
  });
  gunlukInput.value="";
}

function gunlukGoster(){
  db.collection("users")
  .doc(currentUser.uid)
  .collection("gunlukler")
  .orderBy("createdAt","desc")
  .onSnapshot(snap=>{
    gunlukListesi.innerHTML="";
    snap.forEach(doc=>{
      gunlukListesi.innerHTML += `<p>${doc.data().text}</p>`;
    });
  });
}

/* LOAD */
function loadData(){
  kitapGoster();
  gunlukGoster();
}

/* ÇIKIŞ */
function cikis(){
  auth.signOut();
  location.reload();
}
</script>

</body>
</html>
