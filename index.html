<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Pro Shop Full</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "DOMAIN",
  projectId: "PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "seninmail@gmail.com";

/* LOGIN */
window.giris = async function(){
  await signInWithEmailAndPassword(auth, email.value, sifre.value);
}

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  if(user){
    login.style.display="none";
    appDiv.style.display="block";

    if(user.email === ADMIN_EMAIL){
      adminPanel.style.display="block";
    }

    urunleriGetir();
  }
});

/* ÜRÜN EKLE */
window.urunEkle = async function(){
  await addDoc(collection(db,"urunler"),{
    ad: urunAd.value,
    fiyat: Number(urunFiyat.value),
    resim: urunResim.value
  });
  alert("Ürün eklendi");
  urunleriGetir();
}

/* ÜRÜNLER */
async function urunleriGetir(){
  let html="";
  const data = await getDocs(collection(db,"urunler"));

  data.forEach(doc=>{
    let u = doc.data();

    html += `
    <div class="card" data-fiyat="${u.fiyat}">
      <img src="${u.resim}">
      <h3>${u.ad}</h3>
      <p>${u.fiyat} TL</p>
      <button onclick="sepeteEkle('${u.ad}',${u.fiyat})">Sepet</button>

      <input id="yorum_${u.ad}" placeholder="yorum">
      <button onclick="yorumEkle('${u.ad}')">Yorum</button>
      <div id="yorumAlan_${u.ad}"></div>
    </div>`;

    yorumlariGetir(u.ad);
  });

  urunler.innerHTML = html;
}

/* SEPET */
window.sepeteEkle = function(ad,fiyat){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  s.push({ad,fiyat});
  localStorage.setItem("sepet",JSON.stringify(s));
  alert("Sepete eklendi");
}

window.sepetGoster = function(){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  let html="";
  let t=0;

  s.forEach(i=>{
    t+=i.fiyat;
    html+=`<p>${i.ad} - ${i.fiyat}</p>`;
  });

  sepet.innerHTML = html + "<h3>Toplam: "+t+"</h3>";
}

/* SİPARİŞ */
window.siparisVer = async function(){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];

  await addDoc(collection(db,"siparisler"),{
    urunler:s,
    durum:"Hazırlanıyor",
    kargoNo: Math.floor(Math.random()*100000),
    tarih:new Date()
  });

  alert("Ödeme alındı (demo) 💳");
}

/* SİPARİŞLER */
window.siparislerim = async function(){
  let html="";
  const data = await getDocs(collection(db,"siparisler"));

  data.forEach(doc=>{
    let s = doc.data();
    html += `<p>${s.durum} | Kargo: ${s.kargoNo}</p>`;
  });

  siparisAlan.innerHTML = html;
}

/* YORUM */
window.yorumEkle = async function(ad){
  let val = document.getElementById("yorum_"+ad).value;

  await addDoc(collection(db,"yorumlar"),{
    urun:ad,
    yorum:val
  });

  yorumlariGetir(ad);
}

async function yorumlariGetir(ad){
  const data = await getDocs(collection(db,"yorumlar"));
  let html="";

  data.forEach(doc=>{
    let y = doc.data();
    if(y.urun === ad){
      html+=`<p>⭐ ${y.yorum}</p>`;
    }
  });

  let el = document.getElementById("yorumAlan_"+ad);
  if(el) el.innerHTML = html;
}

/* ARAMA */
window.ara = function(text){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(text.toLowerCase()) ? "block":"none";
  });
}

/* FİLTRE */
window.filtre = function(max){
  document.querySelectorAll(".card").forEach(c=>{
    let f = parseInt(c.dataset.fiyat);
    c.style.display = f <= max ? "block":"none";
  });
}
</script>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;}
input{margin:5px;padding:10px;border-radius:8px;border:none;}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#3b82f6;color:white;}
#appDiv{display:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:20px;}
.card{background:#1e293b;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;}
.panel{background:#020617;padding:10px;}
</style>
</head>

<body>

<div id="login">
  <div>
    <h2>Giriş</h2>
    <input id="email">
    <input id="sifre" type="password">
    <button onclick="giris()">Giriş</button>
  </div>
</div>

<div id="appDiv">

  <div class="panel">
    <input oninput="ara(this.value)" placeholder="Ara">
    <input type="range" min="0" max="50000" oninput="filtre(this.value)">
    <button onclick="sepetGoster()">Sepet</button>
    <button onclick="siparisVer()">Öde</button>
    <button onclick="siparislerim()">Siparişlerim</button>
  </div>

  <div id="adminPanel" class="panel" style="display:none">
    <h3>Admin Panel</h3>
    <input id="urunAd" placeholder="Ad">
    <input id="urunFiyat" placeholder="Fiyat">
    <input id="urunResim" placeholder="Resim link">
    <button onclick="urunEkle()">Ekle</button>
  </div>

  <div id="urunler" class="grid"></div>
  <div id="sepet"></div>
  <div id="siparisAlan"></div>

</div>

</body>
</html>
