<!DOCTYPE html>
<html lang="tr">
<head> 
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yeni Nesil Uygulama</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    font-size: 16px;
}

/* LOGIN */
#loginPage {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 300px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

input, textarea {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* TOP BAR */
#topBar {
    display: none;
    justify-content: space-between;
    background: #1e3a8a;
    color: white;
    padding: 10px;
}

/* BUTTONS */
button {
    border: none;
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
}

/* SECTIONS */
.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

/* CARD STYLE */
.card {
    background: white;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

/* PROFILE */
#profileMenu {
    display: none;
    position: absolute;
    right: 10px;
    top: 50px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* MOBILE */
@media (max-width: 768px) {
    button {
        width: 100%;
        margin-top: 5px;
    }

    input, textarea {
        width: 100%;
    }

    #topBar {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="box">
        <h2>Giriş</h2>
        <input id="ad" placeholder="Ad">
        <input id="soyad" placeholder="Soyad">
        <input id="email" placeholder="Email">
        <input id="sifre" type="password" placeholder="Şifre">
        <small id="error" style="color:red;"></small>
        <br><br>
        <button onclick="giris()">Giriş Yap</button>
    </div>
</div>

<!-- TOP BAR -->
<div id="topBar">
    <div>📘 App</div>

    <div>
        <button onclick="show('kitap')">Kitap</button>
        <button onclick="show('gunluk')">Günlük</button>
        <button onclick="toggleProfile()">👤 Profil</button>
        <button onclick="show('ayarlar')">⚙️ Ayarlar</button>
        <button onclick="cikis()">🚪 Çıkış</button>
    </div>
</div>

<!-- PROFILE -->
<div id="profileMenu">
    <p id="profilBilgi"></p>

    <input id="yeniAd" placeholder="Yeni Ad">
    <input id="yeniSoyad" placeholder="Yeni Soyad">
    <button onclick="isimDegistir()">İsim Değiştir</button>

    <input type="file" id="avatar">
</div>

<!-- KITAP -->
<div id="kitap" class="section">
    <h2>Kitap</h2>
    <input id="kitapInput" placeholder="Kitap adı">
    <button onclick="kitapEkle()">Ekle</button>
    <div id="kitapListesi"></div>
</div>

<!-- GÜNLÜK -->
<div id="gunluk" class="section">
    <h2>Günlük</h2>
    <textarea id="gunlukInput"></textarea>
    <button onclick="gunlukEkle()">Ekle</button>
    <div id="gunlukListesi"></div>
</div>

<!-- AYARLAR -->
<div id="ayarlar" class="section">
    <h2>Ayarlar</h2>
    <p>Profil ve hesap yönetimi</p>
</div>

<script>

let user = {};

// EMAIL CHECK
function isGmail(email){
    return email.endsWith("@gmail.com");
}

// LOGIN
function giris() {

    if(!isGmail(email.value)){
        error.innerText = "Email @gmail.com olmalı!";
        return;
    }

    if(sifre.value.length < 8){
        error.innerText = "Şifre en az 8 karakter olmalı!";
        return;
    }

    user = {
        ad: ad.value,
        soyad: soyad.value,
        email: email.value,
        sifre: sifre.value
    };

    localStorage.setItem("user", JSON.stringify(user));

    loginPage.style.display = "none";
    topBar.style.display = "flex";

    profilGuncelle();
    show("kitap");
}

// PROFILE
function profilGuncelle() {
    profilBilgi.innerText = user.ad + " " + user.soyad + "\n" + user.email;
}

function toggleProfile() {
    profileMenu.style.display = profileMenu.style.display === "block" ? "none" : "block";
}

function isimDegistir() {
    user.ad = yeniAd.value;
    user.soyad = yeniSoyad.value;
    localStorage.setItem("user", JSON.stringify(user));
    profilGuncelle();
}

function cikis() {
    localStorage.clear();
    location.reload();
}

// PAGE
function show(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// KITAP
function kitapEkle() {
    let list = JSON.parse(localStorage.getItem("kitaplar")) || [];
    list.push(kitapInput.value);
    localStorage.setItem("kitaplar", JSON.stringify(list));
    kitapGoster();
}

function kitapGoster() {
    let list = JSON.parse(localStorage.getItem("kitaplar")) || [];
    kitapListesi.innerHTML = "";
    list.forEach((k,i)=>{
        kitapListesi.innerHTML += `<div class="card">${k} <button onclick="kitapSil(${i})">❌</button></div>`;
    });
}

function kitapSil(i){
    let list = JSON.parse(localStorage.getItem("kitaplar"));
    list.splice(i,1);
    localStorage.setItem("kitaplar", JSON.stringify(list));
    kitapGoster();
}

// GÜNLÜK
function gunlukEkle() {
    let list = JSON.parse(localStorage.getItem("gunluklar")) || [];
    list.push(gunlukInput.value);
    localStorage.setItem("gunluklar", JSON.stringify(list));
    gunlukGoster();
}

function gunlukGoster() {
    let list = JSON.parse(localStorage.getItem("gunluklar")) || [];
    gunlukListesi.innerHTML = "";
    list.forEach((g,i)=>{
        gunlukListesi.innerHTML += `
        <div class="card">
        ${g}
        <br>
        <button onclick="gunlukSil(${i})">❌</button>
        <button onclick="gunlukDuzenle(${i})">✏️</button>
        </div>`;
    });
}

function gunlukSil(i){
    let list = JSON.parse(localStorage.getItem("gunluklar"));
    list.splice(i,1);
    localStorage.setItem("gunluklar", JSON.stringify(list));
    gunlukGoster();
}

function gunlukDuzenle(i){
    let list = JSON.parse(localStorage.getItem("gunluklar"));
    let yeni = prompt("Yeni metin:", list[i]);
    if(yeni){
        list[i]=yeni;
        localStorage.setItem("gunluklar", JSON.stringify(list));
        gunlukGoster();
    }
}

// LOAD
window.onload = function(){
    let u = localStorage.getItem("user");
    if(u){
        user = JSON.parse(u);
        loginPage.style.display = "none";
        topBar.style.display = "flex";
        profilGuncelle();
        show("kitap");
        kitapGoster();
        gunlukGoster();
    }
}
</script>

</body>
</html>
