<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Mini Shop</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "API_KEY",
  authDomain: "DOMAIN",
  projectId: "PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* LOGIN */
window.giris = async function(){
  await signInWithEmailAndPassword(auth, email.value, sifre.value);
  login.style.display="none";
  appDiv.style.display="block";
  urunleriGetir();
}

/* ÜRÜN EKLE (SATICI) */
window.urunEkle = async function(){
  await addDoc(collection(db,"urunler"),{
    ad: urunAd.value,
    fiyat: Number(urunFiyat.value),
    resim: urunResim.value
  });
  alert("Ürün eklendi");
  urunleriGetir();
}

/* ÜRÜNLERİ ÇEK */
async function urunleriGetir(){
  let html="";
  const data = await getDocs(collection(db,"urunler"));
  data.forEach(doc=>{
    let u = doc.data();
    html += `
    <div class="card">
      <img src="${u.resim}">
      <h3>${u.ad}</h3>
      <p>${u.fiyat} TL</p>
      <button onclick="sepeteEkle('${u.ad}',${u.fiyat})">Sepet</button>
    </div>`;
  });
  urunler.innerHTML = html;
}

/* SEPET */
window.sepeteEkle = function(ad,fiyat){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  s.push({ad,fiyat});
  localStorage.setItem("sepet",JSON.stringify(s));
  alert("Eklendi");
}

window.sepetGoster = function(){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  let html="";
  let t=0;

  s.forEach(i=>{
    t+=i.fiyat;
    html+=`<p>${i.ad} - ${i.fiyat}</p>`;
  });

  sepet.innerHTML = html + "<h3>Toplam: "+t+"</h3>";
}
</script>

<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0;}
#login{height:100vh;display:flex;justify-content:center;align-items:center;}
input{margin:5px;padding:10px;border-radius:8px;border:none;}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#3b82f6;color:white;}
#appDiv{display:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:20px;}
.card{background:#1e293b;padding:10px;border-radius:10px;text-align:center;}
.card img{width:100%;}
.panel{background:#020617;padding:10px;}
</style>
</head>

<body>

<div id="login">
  <div>
    <h2>Giriş</h2>
    <input id="email" placeholder="Email">
    <input id="sifre" type="password" placeholder="Şifre">
    <button onclick="giris()">Giriş</button>
  </div>
</div>

<div id="appDiv">

  <div class="panel">
    <h3>🛒 Mini Trendyol</h3>
    <button onclick="sepetGoster()">Sepet</button>
  </div>

  <!-- SATIŞ PANELİ -->
  <div class="panel">
    <h3>Ürün Ekle (Satıcı)</h3>
    <input id="urunAd" placeholder="Ürün adı">
    <input id="urunFiyat" placeholder="Fiyat">
    <input id="urunResim" placeholder="Resim link">
    <button onclick="urunEkle()">Ekle</button>
  </div>

  <!-- ÜRÜNLER -->
  <div id="urunler" class="grid"></div>

  <!-- SEPET -->
  <div id="sepet"></div>

</div>

</body>
</html>
