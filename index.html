<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Shop</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDwTZvXVh4KBViFp_6ELfkNViaaKz-8Umg",
  authDomain: "emwess-1c215.firebaseapp.com",
  projectId: "emwess-1c215",
  storageBucket: "emwess-1c215.firebasestorage.app",
  messagingSenderId: "1085028708013",
  appId: "1:1085028708013:web:246bed97c26ce49b072024",
  measurementId: "G-WCX7QRGWF3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "seninmail@gmail.com";

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  if(user){
    userBtn.innerText="Çıkış";
    if(user.email === ADMIN_EMAIL){
      adminPanel.style.display="block";
    }
  }else{
    userBtn.innerText="Giriş Yap";
    adminPanel.style.display="none";
  }
});

window.authAction = async function(){
  if(auth.currentUser){
    await signOut(auth);
  }else{
    let email = prompt("Email");
    let sifre = prompt("Şifre");
    await signInWithEmailAndPassword(auth,email,sifre);
  }
}

/* ÜRÜN EKLE */
window.urunEkle = async function(){
  await addDoc(collection(db,"urunler"),{
    ad: ad.value,
    fiyat: Number(fiyat.value),
    resim: resim.value,
    kategori: kategori.value
  });
  urunleriGetir();
}

/* ÜRÜN SİL */
window.urunSil = async function(id){
  await deleteDoc(doc(db,"urunler",id));
  urunleriGetir();
}

/* ÜRÜNLER */
async function urunleriGetir(){
  let data = await getDocs(collection(db,"urunler"));
  let html="";

  data.forEach(d=>{
    let u = d.data();

    html += `
    <div class="card" data-kategori="${u.kategori}" data-fiyat="${u.fiyat}">
      <img src="${u.resim}">
      <h3>${u.ad}</h3>
      <p>${u.fiyat} TL</p>

      <button onclick="sepeteEkle('${u.ad}',${u.fiyat})">Sepet</button>
      <button onclick="favoriEkle('${u.ad}')">❤️</button>
      <button onclick="urunSil('${d.id}')">Sil</button>

      <input id="yorum_${u.ad}" placeholder="yorum">
      <button onclick="yorumEkle('${u.ad}')">Yorum</button>
      <div id="yorumAlan_${u.ad}"></div>
    </div>`;

    yorumlariGetir(u.ad);
  });

  urunler.innerHTML = html;
}

/* SEPET */
window.sepeteEkle = function(ad,fiyat){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  s.push({ad,fiyat});
  localStorage.setItem("sepet",JSON.stringify(s));
}

/* SEPET GÖSTER */
window.sepetGoster = function(){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];
  let t=0,html="";

  s.forEach(i=>{
    t+=i.fiyat;
    html += `<p>${i.ad} - ${i.fiyat}</p>`;
  });

  sepet.innerHTML = html + "<h3>Toplam: "+t+"</h3>";
}

/* SİPARİŞ */
window.siparisVer = async function(){
  let s = JSON.parse(localStorage.getItem("sepet")) || [];

  await addDoc(collection(db,"siparisler"),{
    urunler:s,
    durum:"Hazırlanıyor",
    kargoNo:Math.floor(Math.random()*100000)
  });

  alert("Sipariş oluşturuldu");
}

/* SİPARİŞLER */
window.siparislerim = async function(){
  let data = await getDocs(collection(db,"siparisler"));
  let html="";

  data.forEach(d=>{
    let s=d.data();
    html += `<p>Durum: ${s.durum} | Kargo: ${s.kargoNo}</p>`;
  });

  siparisAlan.innerHTML = html;
}

/* YORUM */
window.yorumEkle = async function(ad){
  let val = document.getElementById("yorum_"+ad).value;

  await addDoc(collection(db,"yorumlar"),{
    urun:ad,
    yorum:val
  });

  yorumlariGetir(ad);
}

async function yorumlariGetir(ad){
  let data = await getDocs(collection(db,"yorumlar"));
  let html="";

  data.forEach(d=>{
    let y=d.data();
    if(y.urun===ad){
      html += `<p>⭐ ${y.yorum}</p>`;
    }
  });

  let el=document.getElementById("yorumAlan_"+ad);
  if(el) el.innerHTML = html;
}

/* FAVORİ */
window.favoriEkle = function(ad){
  let f = JSON.parse(localStorage.getItem("fav")) || [];
  f.push(ad);
  localStorage.setItem("fav",JSON.stringify(f));
}

/* ARAMA */
window.ara = function(text){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(text.toLowerCase()) ? "block":"none";
  });
}

/* FİLTRE */
window.filtre = function(kat){
  document.querySelectorAll(".card").forEach(c=>{
    let k=c.getAttribute("data-kategori");
    c.style.display = !kat || k===kat ? "block":"none";
  });
}

urunleriGetir();
</script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
  align-items:center;
}
.nav input{
  padding:8px;
  border-radius:8px;
  border:none;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.card img{width:100%;}
button{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
}
.panel{
  padding:10px;
  background:#020617;
}
</style>
</head>

<body>

<div class="nav">
  <h2>🛒 Pro Shop</h2>

  <input placeholder="Ara..." oninput="ara(this.value)">
  <select onchange="filtre(this.value)">
    <option value="">Tümü</option>
    <option value="telefon">Telefon</option>
    <option value="bilgisayar">Bilgisayar</option>
  </select>

  <div>
    <button id="userBtn" onclick="authAction()">Giriş Yap</button>
    <button onclick="sepetGoster()">Sepet</button>
    <button onclick="siparisVer()">Öde</button>
  </div>
</div>

<div id="adminPanel" class="panel" style="display:none">
  <h3>Admin Panel</h3>
  <input id="ad" placeholder="Ürün adı">
  <input id="fiyat" placeholder="Fiyat">
  <input id="resim" placeholder="Resim URL">
  <input id="kategori" placeholder="Kategori">
  <button onclick="urunEkle()">Ürün Ekle</button>
</div>

<div id="urunler" class="grid"></div>
<div id="sepet"></div>
<div id="siparisAlan"></div>

</body>
</html>
