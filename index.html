<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  width:300px;
  text-align:center;
}

input{
  width:90%;
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

/* APP */
#app{
  display:none;
}

/* HEADER */
.header{
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.cardP{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.cardP img{
  width:100%;
  border-radius:10px;
}

/* CART */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#020617;
  padding:15px;
  overflow:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Giriş</h2>
    <input id="email" placeholder="Email">
    <input id="sifre" type="password" placeholder="Şifre">
    <button onclick="giris()">Giriş</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <h2>🛒 Pro Shop</h2>
    <button onclick="toggleCart()">Sepet 🧺</button>
  </div>

  <div class="products" id="urunler"></div>

</div>

<!-- CART -->
<div class="cart" id="cart" style="display:none">
  <h3>Sepet</h3>
  <div id="cartList"></div>
  <h4 id="total"></h4>
  <button onclick="siparisVer()">Sipariş Ver</button>
</div>

<script>

/* LOGIN (basit) */
function giris(){
  if(email.value && sifre.value){
    login.style.display="none";
    app.style.display="block";
  }
}

/* ÜRÜNLER */
let urunler = [
  {ad:"Kulaklık", fiyat:500, img:"https://picsum.photos/200?1"},
  {ad:"Telefon", fiyat:15000, img:"https://picsum.photos/200?2"},
  {ad:"Laptop", fiyat:30000, img:"https://picsum.photos/200?3"},
  {ad:"Klavye", fiyat:1000, img:"https://picsum.photos/200?4"}
];

let sepet = JSON.parse(localStorage.getItem("sepet")) || [];

/* ÜRÜNLERİ GÖSTER */
function urunleriGoster(){
  urunler.forEach((u,i)=>{
    urunlerDiv.innerHTML += `
    <div class="cardP">
      <img src="${u.img}">
      <h3>${u.ad}</h3>
      <p>${u.fiyat} TL</p>
      <button onclick="sepeteEkle(${i})">Sepete Ekle</button>
    </div>`;
  });
}

/* SEPET */
function sepeteEkle(i){
  sepet.push(urunler[i]);
  localStorage.setItem("sepet",JSON.stringify(sepet));
  alert("Sepete eklendi");
}

/* CART GÖSTER */
function toggleCart(){
  cart.style.display = cart.style.display=="none" ? "block":"none";
  cartGoster();
}

function cartGoster(){
  cartList.innerHTML="";
  let toplam=0;

  sepet.forEach(u=>{
    toplam += u.fiyat;
    cartList.innerHTML += `<p>${u.ad} - ${u.fiyat} TL</p>`;
  });

  total.innerText = "Toplam: " + toplam + " TL";
}

/* SİPARİŞ */
function siparisVer(){
  alert("Sipariş verildi 🎉");
  sepet=[];
  localStorage.removeItem("sepet");
  cartGoster();
}

/* INIT */
urunleriGoster();

</script>

</body>
</html>
